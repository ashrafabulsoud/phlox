services:
  phlox:
    build:
      context: .
      dockerfile: Dockerfile
    # Prefer a prebuilt image? Comment out `build:` above and use your registry:
    # image: registry.siyadalab.com/phlox:latest
    restart: unless-stopped
    environment:
      # Required
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - TZ=${TZ}
      # CORS — must match the origin you load Phlox from (needed for browser mic recording)
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # Optional LLM tuning
      - LLM_EXTRA_BODY=${LLM_EXTRA_BODY}
      # Optional forward-auth (Cloudflare Access / Authelia inject the user header)
      - PROXY_AUTH_ENABLED=${PROXY_AUTH_ENABLED}
      - PROXY_AUTH_USER_HEADER=${PROXY_AUTH_USER_HEADER}
      - PROXY_AUTH_ALLOWED_USERS=${PROXY_AUTH_ALLOWED_USERS}
      # Optional rate limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
    volumes:
      - phlox_data:/usr/src/app/data
      - phlox_logs:/usr/src/app/logs
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.phlox.rule=Host(`${PHLOX_DOMAIN}`)
      - traefik.http.routers.phlox.entrypoints=websecure
      - traefik.http.routers.phlox.tls.certresolver=letsencrypt
      - traefik.http.services.phlox.loadbalancer.server.port=5000

volumes:
  phlox_data:
  phlox_logs:

networks:
  dokploy-network:
    external: true